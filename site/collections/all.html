<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All ebooks - BEMS Books</title>
  <meta name="description" content="Browse all ebooks available from BEMS Books.">
  <link rel="stylesheet" href="/assets/bems-store.css">
  <script src="/assets/bems-store.js" defer></script>
</head>
<body data-page="collection">
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="/index.html"><span class="brand-mark">BB</span><span>BEMS Books</span></a>
      <div class="nav-links"><a href="/collections/all.html">Ebooks</a><a href="/pages/about.html">About</a><a href="/pages/faq.html">FAQ</a><a href="/pages/contact.html">Contact</a></div>
      <div class="nav-actions"><a data-account-link href="/account/login.html">Login</a><a class="cart-link" href="/cart.html">Cart <span class="cart-count" data-cart-count>0</span></a></div>
    </nav>
  </header>
  <main class="section">
    <div class="container product-container">
      <p class="eyebrow">BEMS Books catalog</p>
      <h1 id="collection-title">Browse ebooks</h1>
      <p class="lead">Search by title, author, topic, or category. Every purchase is digital.</p>
      <div class="toolbar">
        <input id="product-search" class="input" type="search" placeholder="Search ebooks, authors, or topics">
        <select id="category-filter" class="select" aria-label="Filter by category"></select>
        <select id="sort-filter" class="select" aria-label="Sort ebooks">
          <option value="">Featured</option>
          <option value="title">Title A-Z</option>
          <option value="price-asc">Price low to high</option>
          <option value="price-desc">Price high to low</option>
        </select>
      </div>
      <div id="page-message" class="hidden"></div>
      <div id="product-grid" class="grid"><p class="notice">Loading ebooks...</p></div>
    </div>
  </main>
  <footer class="site-footer"><div class="container footer-bottom">Copyright 2026 BEMS Books. Digital products only.</div></footer>
</body>
</html>
