<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - BEMS Books</title>
  <link rel="stylesheet" href="/assets/bems-store.css">
  <script src="/assets/bems-store.js" defer></script>
</head>
<body data-page="auth">
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="/index.html"><span class="brand-mark">BB</span><span>BEMS Books</span></a>
      <div class="nav-links"><a href="/collections/all.html">Ebooks</a><a href="/pages/about.html">About</a><a href="/pages/contact.html">Contact</a></div>
      <div class="nav-actions"><a class="cart-link" href="/cart.html">Cart <span class="cart-count" data-cart-count>0</span></a></div>
    </nav>
  </header>
  <main class="auth-wrap">
    <section class="auth-card">
      <p class="eyebrow">Customer account</p>
      <h1>Welcome back</h1>
      <p class="lead">Log in to continue checkout and access your purchased ebooks.</p>
      <div id="auth-message" class="hidden"></div>
      <form id="login-form" class="form-stack">
        <input class="input" type="email" name="email" placeholder="Email address" required>
        <input class="input" type="password" name="password" placeholder="Password" required>
        <button class="button gold" type="submit">Login</button>
      </form>
      <div class="form-stack">
        <a class="button secondary" href="/api/auth/google">Continue with Google</a>
        <p class="meta">New to BEMS Books? <a href="/account/register.html">Create an account</a></p>
      </div>
    </section>
  </main>
</body>
</html>
